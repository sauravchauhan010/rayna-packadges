<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rayna Tours — Premium Group Departures</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0d0d0d;
      --white:  #ffffff;
      --off:    #f5f4f1;
      --muted:  #888580;
      --border: #e4e2dd;
      --gold:   #c8a84b;
      --gold2:  #e8c96e;
      --navy:   #0f1f3d;
      --red:    #c0392b;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TYPOGRAPHY ── */
    .display {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.02em;
    }
    .heading {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }
    .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── LAYOUT ── */
    .wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
    @media(max-width:640px) { .wrap { padding: 0 16px; } }

    /* ── NAV ── */
    #nav {
      position: sticky; top: 0; z-index: 50;
      background: var(--black);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      height: 64px;
      display: flex; align-items: center;
    }
    .nav-inner {
      width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 32px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo-mark {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; text-decoration: none;
    }
    .logo-icon {
      width: 36px; height: 36px; background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 15px; color: var(--black); letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 17px; color: var(--white); letter-spacing: -0.01em;
    }
    .logo-text span { color: var(--gold); }
    .live-chip {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
    }
    .live-dot {
      width: 6px; height: 6px; background: #4ade80;
      border-radius: 50%; animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .nav-actions { display: flex; align-items: center; gap: 8px; }
    .nav-btn {
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 4px; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent; color: rgba(255,255,255,0.5);
      transition: all 0.15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.08); color: var(--white); }
    .nav-link {
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
      text-decoration: none; padding: 4px 0;
    }
    .nav-link:hover { color: rgba(255,255,255,0.5); }

    /* ── HERO ── */
    #hero {
      background: var(--black);
      position: relative; overflow: hidden;
    }
    .hero-img {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      opacity: 0.22;
    }
    .hero-content {
      position: relative; z-index: 1;
      max-width: 820px; margin: 0 auto;
      padding: 100px 32px 80px;
      text-align: center;
    }
    @media(max-width:640px) { .hero-content { padding: 64px 16px 56px; } }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid rgba(200,168,75,0.4);
      padding: 6px 14px; margin-bottom: 28px;
    }
    .hero-badge span { font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); }

    .hero-title {
      font-size: clamp(42px, 7vw, 80px);
      color: var(--white);
      margin-bottom: 20px;
    }
    .hero-title em { color: var(--gold); font-style: normal; }

    .hero-sub {
      font-size: 16px; color: rgba(255,255,255,0.5);
      line-height: 1.75; max-width: 520px; margin: 0 auto 40px;
      font-weight: 400;
    }

    .search-bar {
      max-width: 460px; margin: 0 auto;
      position: relative;
    }
    .search-bar input {
      width: 100%; height: 52px;
      background: var(--white);
      border: none; outline: none;
      padding: 0 20px 0 48px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 400;
      color: var(--black);
    }
    .search-bar input::placeholder { color: #aaa; }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }

    /* ── CATALOG ── */
    #catalog { padding: 72px 0; background: var(--off); }

    .section-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 40px; flex-wrap: wrap; gap: 12px;
    }
    .section-title { font-size: clamp(26px,4vw,36px); }
    .count-pill {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      color: var(--muted); background: var(--white);
      border: 1px solid var(--border);
      padding: 6px 14px;
    }

    /* ── GRID ── */
    .pkg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
      gap: 2px;
    }

    .pkg-card {
      background: var(--white);
      display: flex; flex-direction: column;
      cursor: pointer;
      transition: none;
      border: 1px solid var(--border);
    }
    .pkg-card:hover .card-img img { transform: scale(1.05); }
    .pkg-card:hover .card-cta { background: var(--gold2); }

    .card-img {
      position: relative; aspect-ratio: 16/10; overflow: hidden;
      background: #ddd;
    }
    .card-img img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: transform 0.5s ease;
    }
    .card-flag {
      position: absolute; top: 14px; left: 14px;
      background: var(--black); color: var(--gold);
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; padding: 5px 10px;
    }

    .card-body { padding: 22px 22px 20px; flex: 1; display: flex; flex-direction: column; }
    .card-country {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 22px; letter-spacing: -0.01em;
      color: var(--black); margin-bottom: 4px;
    }
    .card-duration {
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    }
    .card-divider { height: 1px; background: var(--border); margin-bottom: 16px; }
    .card-footer { display: flex; gap: 8px; margin-top: auto; }

    .card-cta {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--gold); color: var(--black);
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 11px 14px; border: none; cursor: pointer;
      text-decoration: none; transition: background 0.2s;
    }
    .card-cta:hover { background: var(--gold2); }

    .card-inquiry {
      padding: 11px 14px; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .card-inquiry:hover { border-color: var(--black); color: var(--black); }

    /* ── EMPTY / LOADING ── */
    .state-box {
      padding: 80px 24px; text-align: center;
      background: var(--white); border: 1px solid var(--border);
    }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 16px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOGIN ── */
    #login-view {
      min-height: calc(100vh - 64px);
      background: var(--black);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
    }
    .login-card {
      background: var(--white); width: 100%; max-width: 380px;
    }
    .login-head {
      background: var(--black); padding: 32px 28px;
      border-bottom: 3px solid var(--gold);
    }
    .login-body { padding: 28px; display: flex; flex-direction: column; gap: 16px; }

    /* ── ADMIN ── */
    #admin-view { padding: 40px 0 80px; background: var(--off); min-height: calc(100vh - 64px); }

    .admin-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media(max-width:900px) { .admin-grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--white);
      border: 1px solid var(--border);
    }
    .panel-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
    .panel-body { padding: 22px; }

    /* Form */
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted);
    }
    .form-input {
      height: 40px; padding: 0 12px;
      border: 1px solid var(--border);
      background: var(--white);
      font-family: 'Inter', sans-serif; font-size: 13px; color: var(--black);
      outline: none; width: 100%;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--black); }
    .form-hint { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 11px 20px; cursor: pointer; border: none; transition: all 0.15s;
      text-decoration: none;
    }
    .btn-primary { background: var(--black); color: var(--white); }
    .btn-primary:hover { background: #222; }
    .btn-gold { background: var(--gold); color: var(--black); }
    .btn-gold:hover { background: var(--gold2); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--black); border-color: var(--black); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid #f5c6c2; font-size: 10px; padding: 7px 12px; }
    .btn-danger:hover { background: #fff5f5; }
    .btn-sm { font-size: 10px; padding: 7px 12px; }
    .btn-full { width: 100%; }

    /* Alerts */
    .alert { padding: 10px 14px; font-size: 12px; font-weight: 500; margin-bottom: 14px; }
    .alert-error { background: #fff5f5; border: 1px solid #f5c6c2; color: var(--red); }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted);
      padding: 10px 16px; background: var(--off);
      border-bottom: 1px solid var(--border); text-align: left;
    }
    .data-table td {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-size: 13px; vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr.editing td { background: #fffbf0; }
    .data-table tr:hover td { background: var(--off); }
    .data-table tr.editing:hover td { background: #fffbf0; }

    /* Lead card */
    .lead-card {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .lead-card:last-child { border-bottom: none; }
    .lead-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
    .lead-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .lead-pkg {
      display: inline-block; margin-top: 8px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      background: var(--off); color: var(--black);
      padding: 4px 10px; border: 1px solid var(--border);
    }

    /* Tag */
    .tag {
      display: inline-block; font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 8px;
    }
    .tag-gold { background: rgba(200,168,75,0.12); color: #8a6c1a; border: 1px solid rgba(200,168,75,0.3); }
    .tag-green { background: rgba(22,163,74,0.1); color: #15803d; border: 1px solid rgba(22,163,74,0.25); }
    .tag-local { background: rgba(251,191,36,0.1); color: #b45309; border: 1px solid rgba(251,191,36,0.3); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(13,13,13,0.85);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal {
      background: var(--white); width: 100%; max-width: 420px;
      animation: slideUp 0.22s ease;
      overflow: hidden;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .modal-head {
      background: var(--black);
      padding: 24px 28px;
      border-bottom: 3px solid var(--gold);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .modal-close {
      background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.5);
      width: 28px; height: 28px; cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .modal-close:hover { background: rgba(255,255,255,0.15); color: var(--white); }
    .modal-body { padding: 24px 28px; }

    /* Success state */
    .success-state { padding: 40px 28px; text-align: center; }
    .check-circle {
      width: 52px; height: 52px; background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px; border-radius: 50%;
    }

    /* Footer */
    #footer {
      background: var(--black);
      padding: 32px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .footer-inner {
      max-width: 1280px; margin: 0 auto; padding: 0 32px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px;
    }
    .footer-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: var(--white); }
    .footer-logo span { color: var(--gold); }
    .footer-copy { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 3px; }

    /* Sticky form panel */
    .sticky-panel { position: sticky; top: 80px; }

    /* Status bar */
    .status-bar {
      background: var(--navy);
      padding: 14px 22px; margin-bottom: 24px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px;
    }
    .status-bar-text { font-size: 13px; color: rgba(255,255,255,0.65); font-weight: 500; }
    .status-bar-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }

    /* Thumbnail */
    .pkg-thumb {
      width: 40px; height: 40px; object-fit: cover; background: var(--off);
      display: block; flex-shrink: 0;
    }

    /* Responsive */
    @media(max-width:640px) {
      .admin-grid { grid-template-columns: 1fr; }
      .sticky-panel { position: static; }
      .hero-content { padding: 56px 16px 48px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--black);">
    <div class="spinner" style="border-top-color:var(--gold);border-color:rgba(200,168,75,0.2);border-top-color:var(--gold);"></div>
    <p style="font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.12em;text-transform:uppercase;font-weight:600;">Loading</p>
  </div>
</div>

<script type="module">
  import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  /* ── CONFIG ───────────────────────────────────────────────── */
  const FB = {
    apiKey:            "AIzaSyDLIMISKaknbAIqwHrbk8xIbMjETktlzwU",
    authDomain:        "packadge-itenary.firebaseapp.com",
    projectId:         "packadge-itenary",
    storageBucket:     "packadge-itenary.firebasestorage.app",
    messagingSenderId: "482476048193",
    appId:             "1:482476048193:web:4164c8c466c5e856b96bc0"
  };
  const ADMIN_USER = 'admin@smc';
  const ADMIN_PASS = 'smctours2026';
  const APP_ID     = (typeof window.__app_id !== 'undefined' && window.__app_id) || 'smc-tours-portal-v2';

  const SEEDS = [
    { id:'s1', title:'Switzerland',     duration:'3 Nights / 4 Days', highlight:'Zurich 3N',             image:'https://images.unsplash.com/photo-1538370965046-79c0d6907d47?auto=format&fit=crop&w=800&q=80', pdfUrl:'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf', createdAt:new Date().toISOString() },
    { id:'s2', title:'France',           duration:'4 Nights / 5 Days', highlight:'Paris 4N',              image:'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=800&q=80', pdfUrl:'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf', createdAt:new Date().toISOString() },
    { id:'s3', title:'United Kingdom',   duration:'5 Nights / 6 Days', highlight:'London 5N',             image:'https://images.unsplash.com/photo-1513635269975-59663e0ca1ad?auto=format&fit=crop&w=800&q=80', pdfUrl:'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf', createdAt:new Date().toISOString() },
    { id:'s4', title:'Italy',            duration:'5 Nights / 6 Days', highlight:'Rome 3N + Florence 2N', image:'https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=800&q=80', pdfUrl:'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf', createdAt:new Date().toISOString() }
  ];

  /* ── FIREBASE ─────────────────────────────────────────────── */
  const fbReady = !!FB?.apiKey;
  let app, auth, db;
  if (fbReady) {
    try { app = initializeApp(FB); auth = getAuth(app); db = getFirestore(app); }
    catch(e) { console.error('Firebase init:', e); }
  }

  /* ── STATE ────────────────────────────────────────────────── */
  const S = {
    view: 'customer',
    loggedIn: sessionStorage.getItem('rt_auth') === 'true',
    packages: [], inquiries: [],
    loading: true,
    q: '',
    modalPkg: null, modalSuccess: false,
    loginErr: '', formErr: '', formOk: '', inqErr: '',
    editId: null,
    draft: { title:'', duration:'', highlight:'', image:'', pdfUrl:'' }
  };

  /* ── ROUTING ──────────────────────────────────────────────── */
  function route() {
    const p = new URLSearchParams(window.location.search);
    if (p.has('admin')) return S.loggedIn ? 'admin' : 'login';
    return 'customer';
  }

  /* ── UTILS ────────────────────────────────────────────────── */
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const pkgData = p => JSON.stringify(p).replace(/"/g,'&quot;');
  const save = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(_){} };
  const load = (k,d) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):d; } catch(_){ return d; } };
  const fmtDate = iso => { try { return new Date(iso).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(_){ return iso||''; } };

  /* ── AUTH / DB ────────────────────────────────────────────── */
  async function boot() {
    if (!fbReady || !auth) { S.packages = load('rt_pkgs', SEEDS); S.inquiries = load('rt_inqs', []); S.loading = false; render(); return; }
    try {
      if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token)
        await signInWithCustomToken(auth, window.__initial_auth_token);
      else await signInAnonymously(auth);
    } catch(e) { console.error('Auth:', e); }
  }

  function listen() {
    if (!fbReady || !db) { render(); return; }
    onAuthStateChanged(auth, usr => {
      if (!usr) return;
      S.user = usr;
      const pkgCol = collection(db,'artifacts',APP_ID,'public','data','packages');
      onSnapshot(pkgCol, async snap => {
        const list = []; snap.forEach(d => list.push({id:d.id,...d.data()}));
        if (list.length === 0 && S.loading) {
          for (const {id:_,...d} of SEEDS) { try { await addDoc(pkgCol,d); } catch(e){} }
        } else {
          list.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
          S.packages = list; S.loading = false; render();
        }
      }, e=>{ console.error(e); S.loading=false; render(); });
      const inqCol = collection(db,'artifacts',APP_ID,'public','data','inquiries');
      onSnapshot(inqCol, snap => {
        const list=[]; snap.forEach(d=>list.push({id:d.id,...d.data()}));
        list.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
        S.inquiries=list; render();
      }, e=>console.error(e));
    });
  }

  /* ── HANDLERS ─────────────────────────────────────────────── */
  window.dispatch = (a, p) => {
    if (a==='SEARCH')   { S.q=p; }
    if (a==='OPEN_INQ') { S.modalPkg=p; S.inqErr=''; S.modalSuccess=false; }
    if (a==='CLOSE_INQ'){ S.modalPkg=null; S.modalSuccess=false; }
    if (a==='LOGOUT')   { S.loggedIn=false; sessionStorage.removeItem('rt_auth'); nav(''); }
    if (a==='HOME')     { nav(''); }
    render();
  };

  function nav(q) {
    const u = new URL(window.location); u.searchParams.delete('admin');
    if (q) u.searchParams.set('admin',''); window.history.pushState({}, '', q ? u.toString() : u.toString().replace(/\?$/, ''));
  }

  window.handleLogin = e => {
    e.preventDefault();
    const u = document.getElementById('l-user')?.value?.trim();
    const p = document.getElementById('l-pass')?.value;
    S.loginErr = '';
    if (u===ADMIN_USER && p===ADMIN_PASS) { S.loggedIn=true; sessionStorage.setItem('rt_auth','true'); }
    else S.loginErr = 'Incorrect username or password.';
    render();
  };

  window.startEdit = id => {
    const pkg = S.packages.find(p=>p.id===id); if (!pkg) return;
    S.editId=id; S.formErr=''; S.formOk='';
    S.draft={title:pkg.title,duration:pkg.duration,highlight:pkg.highlight||'',image:pkg.image||'',pdfUrl:pkg.pdfUrl};
    render(); window.scrollTo({top:0,behavior:'smooth'});
  };
  window.cancelEdit = () => { S.editId=null; S.draft={title:'',duration:'',highlight:'',image:'',pdfUrl:''}; S.formErr=''; S.formOk=''; render(); };

  window.submitPkg = async e => {
    e.preventDefault(); S.formErr=''; S.formOk='';
    const g = id => document.getElementById(id)?.value?.trim();
    const title=g('p-title'), duration=g('p-dur'), highlight=g('p-hl'), image=g('p-img'), pdfUrl=g('p-pdf');
    if (!title||!duration||!pdfUrl) { S.formErr='Title, duration and PDF link are required.'; render(); return; }
    try { new URL(pdfUrl); } catch(_) { S.formErr='Enter a valid PDF URL (https://…).'; render(); return; }
    const pl = { title, duration, highlight:highlight||'', image:image||'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=800&q=80', pdfUrl, createdAt:new Date().toISOString() };
    if (!fbReady||!db) {
      if (S.editId) S.packages=S.packages.map(p=>p.id===S.editId?{...p,...pl}:p);
      else S.packages=[{id:'p'+Date.now(),...pl},...S.packages];
      save('rt_pkgs',S.packages);
      S.formOk=S.editId?'Package updated.':'Package published.'; S.editId=null; S.draft={title:'',duration:'',highlight:'',image:'',pdfUrl:''};
      render(); return;
    }
    try {
      if (S.editId) { await updateDoc(doc(db,'artifacts',APP_ID,'public','data','packages',S.editId),pl); S.formOk='Updated.'; }
      else { await addDoc(collection(db,'artifacts',APP_ID,'public','data','packages'),pl); S.formOk='Published.'; }
      S.editId=null; S.draft={title:'',duration:'',highlight:'',image:'',pdfUrl:''};
    } catch(e) { S.formErr='Error: '+e.message; }
    render();
  };

  window.deletePkg = async id => {
    if (!confirm('Delete this package?')) return;
    if (!fbReady||!db) {
      S.packages=S.packages.filter(p=>p.id!==id);
      save('rt_pkgs',S.packages);
      if (S.editId===id) window.cancelEdit(); else render(); return;
    }
    try { await deleteDoc(doc(db,'artifacts',APP_ID,'public','data','packages',id)); if(S.editId===id) window.cancelEdit(); }
    catch(e) { console.error(e); }
  };

  window.submitInq = async e => {
    e.preventDefault(); S.inqErr='';
    const g=id=>document.getElementById(id)?.value?.trim();
    const name=g('i-name'), phone=g('i-phone'), email=g('i-email');
    if (!name||!phone) { S.inqErr='Name and mobile number are required.'; render(); return; }
    if (!/^[\d\s\+\-\(\)]{7,15}$/.test(phone)) { S.inqErr='Enter a valid mobile number.'; render(); return; }
    const pl={customerName:name,phone,email:email||'',packageName:S.modalPkg?.title||'General',createdAt:new Date().toISOString()};
    if (!fbReady||!db) {
      S.inquiries=[{id:'i'+Date.now(),...pl},...S.inquiries]; save('rt_inqs',S.inquiries);
      S.modalSuccess=true; render(); setTimeout(()=>{S.modalPkg=null;S.modalSuccess=false;render();},4000); return;
    }
    try {
      await addDoc(collection(db,'artifacts',APP_ID,'public','data','inquiries'),pl);
      S.modalSuccess=true; render(); setTimeout(()=>{S.modalPkg=null;S.modalSuccess=false;render();},4000);
    } catch(e) { S.inqErr='Failed. Please try again.'; render(); }
  };

  window.archiveInq = async id => {
    if (!fbReady||!db) { S.inquiries=S.inquiries.filter(i=>i.id!==id); save('rt_inqs',S.inquiries); render(); return; }
    try { await deleteDoc(doc(db,'artifacts',APP_ID,'public','data','inquiries',id)); }
    catch(e){ console.error(e); }
  };

  /* ── RENDER ───────────────────────────────────────────────── */
  function render() {
    S.view = route();
    const root = document.getElementById('app');
    if (!root) return;
    const filt = S.packages.filter(p => {
      const q=S.q.toLowerCase();
      return !q || p.title.toLowerCase().includes(q) || (p.highlight||'').toLowerCase().includes(q);
    });

    let html = nav_html() + main_html(filt) + footer_html();
    if (S.modalPkg) html += modal_html();
    root.innerHTML = html;
  }

  /* ── NAV HTML ─────────────────────────────────────────────── */
  function nav_html() {
    return `
    <nav id="nav">
      <div class="nav-inner">
        <div class="logo-mark" onclick="dispatch('HOME')">
          <div class="logo-icon">RT</div>
          <div>
            <div class="logo-text">Rayna <span>Tours</span></div>
            <div class="live-chip"><span class="live-dot"></span>${fbReady?'Live Cloud Portal':'Local Mode'}</div>
          </div>
        </div>
        <div class="nav-actions">
          ${S.view==='admin'&&S.loggedIn ? `<button class="nav-btn" onclick="dispatch('LOGOUT')">Sign Out</button>` : ''}
          ${S.view==='login' ? `<button class="nav-btn" onclick="dispatch('HOME')">← Customer View</button>` : ''}
          ${S.view==='customer' ? `<a href="?admin" class="nav-link">Admin</a>` : ''}
        </div>
      </div>
    </nav>`;
  }

  /* ── MAIN HTML ────────────────────────────────────────────── */
  function main_html(filt) {
    if (S.view==='customer') return customer_html(filt);
    if (S.view==='login')    return login_html();
    if (S.view==='admin')    return admin_html();
    return '';
  }

  /* ── CUSTOMER ─────────────────────────────────────────────── */
  function customer_html(filt) {
    return `
    <main>
      <!-- HERO -->
      <section id="hero">
        <div class="hero-img"></div>
        <div class="hero-content">
          <div class="hero-badge">
            <div style="width:20px;height:1px;background:var(--gold);"></div>
            <span>Premium Group Departures</span>
            <div style="width:20px;height:1px;background:var(--gold);"></div>
          </div>
          <h1 class="display hero-title">
            Explore the World<br>with <em>Rayna Tours</em>
          </h1>
          <p class="hero-sub">
            Curated holiday packages with instant PDF itinerary downloads.<br>
            Request a callback from our travel specialists.
          </p>
          <div class="search-bar">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" placeholder="Search destinations…"
              value="${esc(S.q)}"
              oninput="dispatch('SEARCH',this.value)"
            />
          </div>
        </div>
      </section>

      <!-- CATALOG -->
      <section id="catalog">
        <div class="wrap">
          <div class="section-header">
            <h2 class="heading section-title">Group Departures</h2>
            <span class="count-pill">${filt.length} ${filt.length===1?'package':'packages'}</span>
          </div>

          ${S.loading ? `
            <div class="state-box">
              <div class="spinner"></div>
              <p style="font-size:13px;color:var(--muted);font-weight:500;">Loading packages…</p>
            </div>
          ` : filt.length===0 ? `
            <div class="state-box">
              <p style="font-size:15px;color:var(--muted);margin-bottom:12px;">No packages found.</p>
              ${S.q?`<button class="btn btn-ghost btn-sm" onclick="dispatch('SEARCH','')">Clear Search</button>`:''}
            </div>
          ` : `
            <div class="pkg-grid">
              ${filt.map(pkg=>`
                <div class="pkg-card">
                  <div class="card-img">
                    <img src="${esc(pkg.image)}" alt="${esc(pkg.title)}"
                      onerror="this.src='https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=800&q=80'"/>
                    <div class="card-flag">${esc(pkg.highlight||pkg.title)}</div>
                  </div>
                  <div class="card-body">
                    <div class="card-country">${esc(pkg.title)}</div>
                    <div class="card-duration">${esc(pkg.duration)}</div>
                    <div class="card-divider"></div>
                    <div class="card-footer">
                      <a href="${esc(pkg.pdfUrl)}" target="_blank" rel="noopener noreferrer" class="btn card-cta">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        Itinerary PDF
                      </a>
                      <button class="card-inquiry" onclick="dispatch('OPEN_INQ',${pkgData(pkg)})">
                        Enquire
                      </button>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `}
        </div>
      </section>
    </main>`;
  }

  /* ── LOGIN ────────────────────────────────────────────────── */
  function login_html() {
    return `
    <div id="login-view">
      <div class="login-card">
        <div class="login-head">
          <div class="label" style="color:var(--gold);margin-bottom:8px;">SMC Admin Portal</div>
          <h2 class="heading" style="font-size:26px;color:var(--white);margin-bottom:4px;">Control Room</h2>
          <p style="font-size:12px;color:rgba(255,255,255,0.4);">Sign in with your agency credentials</p>
        </div>
        <div class="login-body">
          ${S.loginErr?`<div class="alert alert-error">${esc(S.loginErr)}</div>`:''}
          <form onsubmit="handleLogin(event)" style="display:flex;flex-direction:column;gap:14px;">
            <div class="form-group">
              <label class="form-label" for="l-user">Username</label>
              <input class="form-input" id="l-user" type="text" placeholder="Enter username" autocomplete="username" />
            </div>
            <div class="form-group">
              <label class="form-label" for="l-pass">Password</label>
              <input class="form-input" id="l-pass" type="password" placeholder="Enter password" autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="height:44px;margin-top:4px;">Sign In</button>
          </form>
        </div>
      </div>
    </div>`;
  }

  /* ── ADMIN ────────────────────────────────────────────────── */
  function admin_html() {
    return `
    <div id="admin-view">
      <div class="wrap">

        <!-- Status Bar -->
        <div class="status-bar">
          <div>
            <div class="status-bar-text">Package Manager Dashboard</div>
            <div class="status-bar-sub">${fbReady?'All changes sync live across all customer-facing pages.':'Running in local storage mode — no Firebase config detected.'}</div>
          </div>
          <span class="tag ${fbReady?'tag-green':'tag-local'}">${fbReady?'● Live Database':'○ Local Mode'}</span>
        </div>

        <div class="admin-grid">

          <!-- FORM PANEL -->
          <div class="sticky-panel">
            <div class="panel">
              <div class="panel-head">
                <div class="panel-title">${S.editId?'Edit Package':'Add Package'}</div>
                ${S.editId?`<button class="btn btn-ghost btn-sm" onclick="cancelEdit()">Cancel</button>`:''}
              </div>
              <div class="panel-body">
                ${S.formErr?`<div class="alert alert-error">${esc(S.formErr)}</div>`:''}
                ${S.formOk?`<div class="alert alert-success">${esc(S.formOk)}</div>`:''}
                <form onsubmit="submitPkg(event)">
                  <div class="form-group">
                    <label class="form-label" for="p-title">Country / Destination *</label>
                    <input class="form-input" id="p-title" type="text" placeholder="e.g. Switzerland" value="${esc(S.draft.title)}" required />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="p-dur">Duration *</label>
                    <input class="form-input" id="p-dur" type="text" placeholder="e.g. 3 Nights / 4 Days" value="${esc(S.draft.duration)}" required />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="p-hl">Highlight Tag</label>
                    <input class="form-input" id="p-hl" type="text" placeholder="e.g. Zurich 3N" value="${esc(S.draft.highlight)}" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="p-img">Cover Image URL</label>
                    <input class="form-input" id="p-img" type="url" placeholder="https://… (Unsplash link)" value="${esc(S.draft.image)}" />
                  </div>
                  <div class="form-group" style="background:var(--off);padding:14px;margin-bottom:16px;">
                    <label class="form-label" for="p-pdf">Itinerary PDF URL *</label>
                    <input class="form-input" id="p-pdf" type="url" placeholder="https://… (Google Drive / Dropbox)" value="${esc(S.draft.pdfUrl)}" required style="background:var(--white);" />
                    <div class="form-hint">Must be a direct or shareable PDF link.</div>
                  </div>
                  <button type="submit" class="btn btn-gold btn-full" style="height:44px;">
                    ${S.editId?'Save Changes':'Publish Package'}
                  </button>
                </form>
              </div>
            </div>
          </div>

          <!-- CONTENT PANELS -->
          <div style="display:flex;flex-direction:column;gap:20px;">

            <!-- Packages Table -->
            <div class="panel">
              <div class="panel-head">
                <div class="panel-title">Live Packages</div>
                <span style="font-size:11px;color:var(--muted);">${S.packages.length} total</span>
              </div>
              ${S.loading?`
                <div style="padding:48px;text-align:center;">
                  <div class="spinner" style="margin:0 auto 12px;"></div>
                  <p style="font-size:12px;color:var(--muted);">Loading…</p>
                </div>
              `:S.packages.length===0?`
                <p style="padding:32px 22px;font-size:13px;color:var(--muted);text-align:center;">No packages yet.</p>
              `:`
                <div style="overflow-x:auto;">
                  <table class="data-table">
                    <thead>
                      <tr>
                        <th>Destination</th>
                        <th>Duration</th>
                        <th>Highlight</th>
                        <th style="text-align:right;">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${S.packages.map(pkg=>`
                        <tr class="${S.editId===pkg.id?'editing':''}">
                          <td>
                            <div style="display:flex;align-items:center;gap:12px;">
                              <img class="pkg-thumb" src="${esc(pkg.image)}" onerror="this.style.visibility='hidden'" />
                              <div>
                                <div style="font-weight:600;font-size:13px;">${esc(pkg.title)}</div>
                                <a href="${esc(pkg.pdfUrl)}" target="_blank" style="font-size:10px;color:var(--gold);text-decoration:none;font-weight:600;letter-spacing:0.06em;">PDF ↗</a>
                              </div>
                            </div>
                          </td>
                          <td style="color:var(--muted);white-space:nowrap;">${esc(pkg.duration)}</td>
                          <td>${pkg.highlight?`<span class="tag tag-gold">${esc(pkg.highlight)}</span>`:`<span style="color:var(--border);">—</span>`}</td>
                          <td style="text-align:right;">
                            <div style="display:flex;gap:6px;justify-content:flex-end;">
                              <button class="btn btn-ghost btn-sm" onclick="startEdit('${esc(pkg.id)}')">Edit</button>
                              <button class="btn btn-danger" onclick="deletePkg('${esc(pkg.id)}')">Delete</button>
                            </div>
                          </td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              `}
            </div>

            <!-- Inquiries -->
            <div class="panel">
              <div class="panel-head">
                <div>
                  <div class="panel-title">Callback Requests</div>
                  <div style="font-size:11px;color:var(--muted);margin-top:2px;">Live leads from customer enquiries</div>
                </div>
                <span style="font-size:11px;color:var(--muted);">${S.inquiries.length} total</span>
              </div>
              ${S.inquiries.length===0?`
                <div style="padding:40px 22px;text-align:center;border:1px dashed var(--border);margin:16px 22px;">
                  <p style="font-size:13px;color:var(--muted);">No callback requests yet.</p>
                </div>
              `:`
                <div>
                  ${S.inquiries.map(l=>`
                    <div class="lead-card">
                      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;">
                        <div>
                          <div class="lead-name">${esc(l.customerName)}</div>
                          <div class="lead-meta">
                            <b style="color:var(--black);">${esc(l.phone)}</b>
                            ${l.email?` &nbsp;·&nbsp; ${esc(l.email)}`:''}
                          </div>
                          <div class="lead-pkg">${esc(l.packageName)}</div>
                        </div>
                        <div style="text-align:right;flex-shrink:0;">
                          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">${fmtDate(l.createdAt)}</div>
                          <button class="btn btn-danger" onclick="archiveInq('${esc(l.id)}')">Archive</button>
                        </div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              `}
            </div>

          </div>
        </div>
      </div>
    </div>`;
  }

  /* ── MODAL ────────────────────────────────────────────────── */
  function modal_html() {
    const pkg = S.modalPkg;
    return `
    <div class="modal-overlay" onclick="if(event.target===this)dispatch('CLOSE_INQ')">
      <div class="modal">
        <div class="modal-head">
          <div>
            <div class="label" style="color:var(--gold);margin-bottom:6px;">Request a Callback</div>
            <div class="heading" style="font-size:22px;color:var(--white);">${esc(pkg.title)}</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;">${esc(pkg.duration)}</div>
          </div>
          <button class="modal-close" onclick="dispatch('CLOSE_INQ')">✕</button>
        </div>
        ${S.modalSuccess?`
          <div class="success-state">
            <div class="check-circle">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--black)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h3 class="heading" style="font-size:22px;margin-bottom:8px;">Request Received</h3>
            <p style="font-size:13px;color:var(--muted);line-height:1.65;">
              A Rayna Tours specialist will contact you shortly regarding the <strong style="color:var(--black);">${esc(pkg.title)}</strong> package.
            </p>
          </div>
        `:`
          <div class="modal-body">
            ${S.inqErr?`<div class="alert alert-error">${esc(S.inqErr)}</div>`:''}
            <form onsubmit="submitInq(event)" style="display:flex;flex-direction:column;gap:14px;">
              <div class="form-group">
                <label class="form-label" for="i-name">Full Name *</label>
                <input class="form-input" id="i-name" type="text" placeholder="Your full name" required autocomplete="name" />
              </div>
              <div class="form-group">
                <label class="form-label" for="i-phone">Mobile Number *</label>
                <input class="form-input" id="i-phone" type="tel" placeholder="+91 98765 43210" required autocomplete="tel" />
              </div>
              <div class="form-group">
                <label class="form-label" for="i-email">Email <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
                <input class="form-input" id="i-email" type="email" placeholder="you@email.com" autocomplete="email" />
              </div>
              <div style="display:flex;gap:8px;padding-top:4px;">
                <button type="button" class="btn btn-ghost" style="flex:1;" onclick="dispatch('CLOSE_INQ')">Cancel</button>
                <button type="submit" class="btn btn-gold" style="flex:2;">Send Request</button>
              </div>
            </form>
          </div>
        `}
      </div>
    </div>`;
  }

  /* ── FOOTER ───────────────────────────────────────────────── */
  function footer_html() {
    return `
    <footer id="footer">
      <div class="footer-inner">
        <div>
          <div class="footer-logo">Rayna <span>Tours</span></div>
          <div class="footer-copy">© 2026 SMC Tours Ltd. All rights reserved.</div>
        </div>
        <div class="label" style="color:rgba(255,255,255,0.2);">${fbReady?'Cloud Connected':'Local Mode'}</div>
      </div>
    </footer>`;
  }

  /* ── BOOT ─────────────────────────────────────────────────── */
  window.addEventListener('popstate', render);
  window.onload = async () => { await boot(); listen(); };
</script>
</body>
</html>
