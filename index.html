<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMC Tours - Premium Group Departures</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 flex flex-col selection:bg-purple-600 selection:text-white">

  <!-- Main App Wrapper -->
  <div id="app" class="min-h-screen flex flex-col">
    <!-- Content will be rendered dynamically by JS -->
    <div class="flex-1 flex items-center justify-center p-8">
      <div class="text-center space-y-3">
        <div class="w-12 h-12 border-4 border-purple-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="text-slate-500 font-semibold text-sm">Initializing SMC Tours Portal...</p>
      </div>
    </div>
  </div>

  <!-- Firebase SDK and Application Logic Module -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Fallback seed packages
    const SEED_PACKAGES = [
      {
        id: 'pkg-default-1',
        title: 'SWITZERLAND',
        duration: '03 NIGHTS / 04 DAYS',
        highlight: 'Zurich 3N',
        image: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=800&q=80',
        pdfUrl: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
        createdAt: new Date().toISOString()
      },
      {
        id: 'pkg-default-2',
        title: 'FRANCE',
        duration: '04 NIGHTS / 05 DAYS',
        highlight: 'Paris 4N',
        image: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=800&q=80',
        pdfUrl: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
        createdAt: new Date().toISOString()
      },
      {
        id: 'pkg-default-3',
        title: 'UNITED KINGDOM',
        duration: '05 NIGHTS / 06 DAYS',
        highlight: 'London 5N',
        image: 'https://images.unsplash.com/photo-1513635269975-59663e0ca1ad?auto=format&fit=crop&w=800&q=80',
        pdfUrl: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
        createdAt: new Date().toISOString()
      }
    ];

    const ADMIN_USERNAME = 'admin@smc';
    const ADMIN_PASSWORD = 'smctours2026';

    // Config Check & Setup (Rule 1 & Rule 3) - Loaded with your Live Firebase credentials
    const firebaseConfig = {
      apiKey: "AIzaSyDLIMISKaknbAIqwHrbk8xIbMjETktlzwU",
      authDomain: "packadge-itenary.firebaseapp.com",
      projectId: "packadge-itenary",
      storageBucket: "packadge-itenary.firebasestorage.app",
      messagingSenderId: "482476048193",
      appId: "1:482476048193:web:4164c8c466c5e856b96bc0",
      measurementId: "G-3VQQFLX9GF"
    };

    // Self-healing database check to avoid crashes/freezes on unconfigured deployments
    const isFirebaseConfigured = !!(firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey !== "");

    let app, auth, db;
    if (isFirebaseConfigured) {
      try {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
      } catch (err) {
        console.error("Firebase SDK failed to initialize:", err);
      }
    }
    const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'smc-tours-portal-v2';

    // Dynamic State Store
    const state = {
      view: 'customer', // 'customer' | 'admin-login' | 'admin'
      isLoggedIn: sessionStorage.getItem('smc_admin_auth') === 'true',
      user: null,
      packages: [],
      inquiries: [],
      isDbLoading: true,
      searchQuery: '',
      selectedInquiryPackage: null,
      showSuccessToast: false,
      loginError: '',
      formError: '',
      inquiryError: '',
      inquiryForm: { name: '', email: '', phone: '' },
      editingPackageId: null, // Track package ID currently being edited
      newPackage: { title: '', duration: '', highlight: '', image: '', pdfUrl: '' }
    };

    // Global action dispatcher to force re-renders
    window.dispatch = (action, payload) => {
      if (action === 'SET_SEARCH') {
        state.searchQuery = payload;
      } else if (action === 'OPEN_INQUIRY') {
        state.selectedInquiryPackage = payload;
        state.inquiryError = '';
        state.showSuccessToast = false;
      } else if (action === 'CLOSE_INQUIRY') {
        state.selectedInquiryPackage = null;
      } else if (action === 'LOGOUT') {
        state.isLoggedIn = false;
        sessionStorage.removeItem('smc_admin_auth');
        const url = new URL(window.location);
        url.searchParams.delete('admin');
        window.history.pushState({}, '', url);
        state.view = 'customer';
      } else if (action === 'REDIRECT_HOME') {
        const url = new URL(window.location);
        url.searchParams.delete('admin');
        window.history.pushState({}, '', url);
        state.view = 'customer';
      }
      render();
    };

    // Determine current routing view
    function evaluateRoute() {
      const queryParams = new URLSearchParams(window.location.search);
      if (queryParams.has('admin')) {
        state.view = state.isLoggedIn ? 'admin' : 'admin-login';
      } else {
        state.view = 'customer';
      }
    }

    // Authenticate prioritizing Custom Token if present (Rule 3)
    async function initAuth() {
      if (!isFirebaseConfigured) {
        // Fallback local auth simulation
        state.user = { uid: "local-admin" };
        return;
      }
      try {
        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
          await signInWithCustomToken(auth, window.__initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("Database initialization connection failed:", err);
      }
    }

    // Initialize Database Listeners with secure local fallbacks
    function setupDatabaseListeners() {
      if (!isFirebaseConfigured) {
        console.log("SMC Tours database loading locally. Firebase configuration empty.");
        // Retrieve local sandbox data
        const localPkgs = localStorage.getItem('smc_local_packages_v3');
        if (localPkgs) {
          state.packages = JSON.parse(localPkgs);
        } else {
          state.packages = [...SEED_PACKAGES];
          localStorage.setItem('smc_local_packages_v3', JSON.stringify(state.packages));
        }

        const localInqs = localStorage.getItem('smc_local_inquiries_v3');
        state.inquiries = localInqs ? JSON.parse(localInqs) : [];

        state.isDbLoading = false;
        render();
        return;
      }

      onAuthStateChanged(auth, (usr) => {
        state.user = usr;
        if (!usr) return;

        // Listen to Packages Collection
        const pkgsCol = collection(db, 'artifacts', appId, 'public', 'data', 'packages');
        onSnapshot(pkgsCol, async (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });

          if (list.length === 0 && state.isDbLoading) {
            // Seed static defaults once if cloud database is fresh
            try {
              for (const item of SEED_PACKAGES) {
                await addDoc(pkgsCol, item);
              }
            } catch (err) {
              console.error("Failed seeding database: ", err);
            }
          } else {
            // In-memory sort
            list.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
            state.packages = list;
            state.isDbLoading = false;
            render();
          }
        }, (error) => {
          console.error("Failed loading packages:", error);
          state.isDbLoading = false;
          render();
        });

        // Listen to Inquiries Collection
        const inqsCol = collection(db, 'artifacts', appId, 'public', 'data', 'inquiries');
        onSnapshot(inqsCol, (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });
          list.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
          state.inquiries = list;
          render();
        }, (error) => {
          console.error("Failed loading inquiries:", error);
        });
      });
    }

    // Event Handlers
    window.handleLoginSubmit = (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const pass = document.getElementById('login-password').value;
      state.loginError = '';

      if (username === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
        state.isLoggedIn = true;
        sessionStorage.setItem('smc_admin_auth', 'true');
        state.view = 'admin';
      } else {
        state.loginError = 'Invalid credentials. Please try again.';
      }
      render();
    };

    // Begin Edit Sequence
    window.handleStartEdit = (id) => {
      const pkg = state.packages.find(p => p.id === id);
      if (!pkg) return;

      state.editingPackageId = id;
      state.newPackage = {
        title: pkg.title,
        duration: pkg.duration,
        highlight: pkg.highlight,
        image: pkg.image,
        pdfUrl: pkg.pdfUrl
      };
      render();
      // Smooth scroll back to form
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // Cancel Edit Sequence
    window.handleCancelEdit = () => {
      state.editingPackageId = null;
      state.newPackage = { title: '', duration: '', highlight: '', image: '', pdfUrl: '' };
      render();
    };

    // Save or Update Package Handler
    window.handleAddPackage = async (e) => {
      e.preventDefault();
      state.formError = '';

      const title = document.getElementById('pkg-title').value;
      const duration = document.getElementById('pkg-duration').value;
      const highlight = document.getElementById('pkg-highlight').value;
      const image = document.getElementById('pkg-image').value;
      const pdfUrl = document.getElementById('pkg-pdf').value;

      if (!title || !duration || !pdfUrl) {
        state.formError = 'Please enter a Country Title, Duration, and a valid PDF link.';
        render();
        return;
      }

      const payload = {
        title: title.toUpperCase(),
        duration: duration.toUpperCase(),
        highlight: highlight || 'Flexible Schedule',
        image: image || 'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=800&q=80',
        pdfUrl: pdfUrl,
        createdAt: new Date().toISOString()
      };

      if (!isFirebaseConfigured) {
        if (state.editingPackageId) {
          // Edit offline
          state.packages = state.packages.map(p => p.id === state.editingPackageId ? { ...p, ...payload } : p);
        } else {
          // Add offline
          state.packages = [{ id: 'pkg-' + Date.now(), ...payload }, ...state.packages];
        }
        localStorage.setItem('smc_local_packages_v3', JSON.stringify(state.packages));
        
        // Reset Inputs & Edit state
        state.editingPackageId = null;
        state.newPackage = { title: '', duration: '', highlight: '', image: '', pdfUrl: '' };
        render();
        return;
      }

      try {
        if (state.editingPackageId) {
          // Update live FireStore document
          const docRef = doc(db, 'artifacts', appId, 'public', 'data
