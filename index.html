<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rayna Tours — Premium Group Departures</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #132040;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #faf8f4;
      --slate-soft: #f1f0ed;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--navy);
      min-height: 100vh;
    }

    h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; }

    /* Spinner */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(201,168,76,0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Card hover */
    .pkg-card { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease; }
    .pkg-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(10,22,40,0.08); }

    .pkg-card img { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .pkg-card:hover img { transform: scale(1.04); }

    /* Overlay backdrop */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(10,22,40,0.6);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-box { animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* Inputs */
    .field {
      width: 100%;
      background: #fff;
      border: 1px solid #ddd8ce;
      border-radius: 6px;
      padding: 9px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--navy);
      outline: none;
      transition: border-color 0.2s;
    }
    .field:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }

    /* Buttons */
    .btn-gold {
      background: var(--gold);
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-0.5px); }
    .btn-gold:active { transform: translateY(0); }

    /* WhatsApp button */
    .btn-whatsapp {
      background: #25D366;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-whatsapp:hover { background: #20ba5a; transform: translateY(-0.5px); }
    .btn-whatsapp:active { transform: translateY(0); }

    .btn-outline {
      background: transparent;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 9px 16px;
      border-radius: 6px;
      border: 1px solid #ddd8ce;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-outline:hover { background: var(--slate-soft); border-color: #c0b9ad; }

    .btn-danger {
      background: transparent;
      color: #b91c1c;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #fecaca;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-danger:hover { background: #fff1f2; }

    .btn-edit {
      background: transparent;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #ddd8ce;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-edit:hover { background: var(--slate-soft); }

    /* Table */
    table { border-collapse: collapse; width: 100%; }
    th { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888; padding: 12px 14px; background: var(--slate-soft); }
    td { padding: 12px 14px; border-top: 1px solid #ede9e1; font-size: 13px; }

    /* Label */
    .field-label {
      display: block; font-size: 9px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: #888;
      margin-bottom: 4px;
    }

    /* Hero Editorial minimal background */
    .hero-bg {
      background-image: linear-gradient(180deg, rgba(10,22,40,0.92) 0%, rgba(10,22,40,0.97) 100%), url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=1600&q=80');
      background-size: cover; background-position: center;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: #c0b9ad; border-radius: 3px; }

    /* Error / Success feedback blocks */
    .error-box { background: #fff1f2; border: 1px solid #fecaca; color: #991b1b; border-radius: 6px; padding: 8px 12px; font-size: 12px; font-weight: 500; }
    .success-box { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; border-radius: 6px; padding: 8px 12px; font-size: 12px; font-weight: 500; }

    /* Live status indicator */
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: pulse 1.8s infinite; display: inline-block; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Compact image wrap */
    .img-wrap { position: relative; overflow: hidden; aspect-ratio: 16/10; background: #e8e4dc; }

    /* Floating highlight strip on client cards */
    .highlight-strip {
      position: absolute; bottom: 8px; left: 8px;
      background: rgba(10, 22, 40, 0.85);
      backdrop-filter: blur(4px);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 4px;
    }

    /* Elegant admin layout bar */
    .admin-bar {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
      color: #fff;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 24px;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }

    /* Highlighted table states */
    .editing-row { background: #fffbf0; }
  </style>
</head>
<body>

<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;">
    <div class="spinner"></div>
    <p style="font-size:13px;color:#888;font-weight:500;letter-spacing:0.05em;">Loading Rayna Tours…</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // ─── INITIAL HOISTING FOR ROBUST LOAD ──────────────────────────────────────
  var isFirebaseReady = false;
  var app = null;
  var auth = null;
  var db = null;
  var APP_ID = 'smc-tours-portal-v2';

  // ─── CONFIG ────────────────────────────────────────────────────────────────
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDLIMISKaknbAIqwHrbk8xIbMjETktlzwU",
    authDomain: "packadge-itenary.firebaseapp.com",
    projectId: "packadge-itenary",
    storageBucket: "packadge-itenary.firebasestorage.app",
    messagingSenderId: "482476048193",
    appId: "1:482476048193:web:4164c8c466c5e856b96bc0"
  };

  if (typeof window.__app_id !== 'undefined' && window.__app_id) {
    APP_ID = window.__app_id;
  }

  let firebaseConfig = FIREBASE_CONFIG;
  if (typeof window.__firebase_config !== 'undefined' && window.__firebase_config) {
    try {
      firebaseConfig = JSON.parse(window.__firebase_config);
    } catch (e) {
      console.error("Error parsing injected __firebase_config:", e);
    }
  }

  isFirebaseReady = !!(firebaseConfig && firebaseConfig.apiKey);

  const SEED_PACKAGES = [
    {
      id: 'seed-1',
      title: 'Switzerland',
      duration: '3 Nights / 4 Days',
      highlight: 'Zurich 3N',
      image: 'https://images.unsplash.com/photo-1538370965046-79c0d6907d47?auto=format&fit=crop&w=800&q=80',
      pdfUrl: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
      createdAt: new Date().toISOString()
    },
    {
      id: 'seed-2',
      title: 'France',
      duration: '4 Nights / 5 Days',
      highlight: 'Paris 4N',
      image: 'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=800&q=80',
      pdfUrl: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
      createdAt: new Date().toISOString()
    },
    {
      id: 'seed-3',
      title: 'United Kingdom',
      duration: '5 Nights / 6 Days',
      highlight: 'London 5N',
      image: 'https://images.unsplash.com/photo-1513635269975-59663e0ca1ad?auto=format&fit=crop&w=800&q=80',
      pdfUrl: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
      createdAt: new Date().toISOString()
    },
    {
      id: 'seed-4',
      title: 'Italy',
      duration: '5 Nights / 6 Days',
      highlight: 'Rome 3N + Florence 2N',
      image: 'https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=800&q=80',
      pdfUrl: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
      createdAt: new Date().toISOString()
    }
  ];

  if (isFirebaseReady) {
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (err) {
      console.error('Firebase init error:', err);
    }
  }

  // ─── STATE ─────────────────────────────────────────────────────────────────
  const state = {
    view: 'customer',
    isLoggedIn: sessionStorage.getItem('smc_admin_auth') === 'true',
    user: null,
    packages: [],
    isDbLoading: true,
    searchQuery: '',
    selectedCountryFilter: 'All',
    loginError: '',
    loginLoading: false,
    formError: '',
    formSuccess: '',
    editingId: null,
    deleteTargetId: null,
    draft: { title: '', duration: '', highlight: '', image: '', pdfUrl: '' }
  };

  // ─── ROUTING ───────────────────────────────────────────────────────────────
  function getView() {
    const p = new URLSearchParams(window.location.search);
    if (p.has('admin')) return state.isLoggedIn ? 'admin' : 'admin-login';
    return 'customer';
  }

  // ─── AUTH ──────────────────────────────────────────────────────────────────
  async function initAuth() {
    if (!isFirebaseReady || !auth) {
      state.user = { uid: 'local-user' };
      return;
    }
    try {
      if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
        await signInWithCustomToken(auth, window.__initial_auth_token);
      } else {
        await signInAnonymously(auth);
      }
    } catch (err) {
      console.warn('Authentication failed. Falling back to local offline sandbox directory.', err);
      db = null;
    }
  }

  // ─── LOCAL STORAGE FALLBACK ENGINE ─────────────────────────────────────────
  function loadLocalFallback() {
    try {
      const localPkgs = localStorage.getItem('smc_pkgs_v4');
      state.packages = localPkgs ? JSON.parse(localPkgs) : [...SEED_PACKAGES];
      if (!localPkgs) localStorage.setItem('smc_pkgs_v4', JSON.stringify(state.packages));
    } catch(_) {
      state.packages = [...SEED_PACKAGES];
    }
    state.isDbLoading = false;
    render();
  }

  // ─── DATABASE ──────────────────────────────────────────────────────────────
  function setupListeners() {
    if (!isFirebaseReady || !db) {
      loadLocalFallback();
      return;
    }

    onAuthStateChanged(auth, (usr) => {
      state.user = usr;
      if (!usr) {
        if (state.isDbLoading) {
          loadLocalFallback();
        }
        return;
      }

      const pkgsCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'packages');
      onSnapshot(pkgsCol, async (snap) => {
        const list = [];
        snap.forEach(d => list.push({ id: d.id, ...d.data() }));

        if (list.length === 0 && state.isDbLoading) {
          try {
            for (const item of SEED_PACKAGES) {
              const { id: _id, ...data } = item;
              await addDoc(pkgsCol, data);
            }
          } catch (err) { console.error('Seed error:', err); }
        } else {
          list.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
          state.packages = list;
          state.isDbLoading = false;
          render();
        }
      }, err => { 
        console.error('Packages listener error:', err); 
        loadLocalFallback();
      });
    });
  }

  // ─── HELPERS ───────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function pkgJson(pkg) {
    return JSON.stringify(pkg).replace(/"/g, '&quot;');
  }

  function saveLocal(key, data) {
    try { localStorage.setItem(key, JSON.stringify(data)); } catch(_) {}
  }

  window.redirectToWhatsApp = (pkg) => {
    const phoneNumber = "919106322937";
    const textMessage = `Hello Rayna Tours, I'm interested in booking the following Premium Departure package:

📍 Destination: ${pkg.title}
⏳ Duration: ${pkg.duration}
✨ Highlights: ${pkg.highlight || 'Detailed Itinerary Included'}
📄 Itinerary Details: ${pkg.pdfUrl}

Please let me know the booking procedures and upcoming departures. Thank you!`;
    
    const waUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(textMessage)}`;
    window.open(waUrl, '_blank');
  };

  // ─── DISPATCH ──────────────────────────────────────────────────────────────
  window.dispatch = (action, payload) => {
    switch(action) {
      case 'SEARCH':
        state.searchQuery = payload;
        break;
      case 'SET_COUNTRY_FILTER':
        state.selectedCountryFilter = payload;
        break;
      case 'LOGOUT':
        state.isLoggedIn = false;
        sessionStorage.removeItem('smc_admin_auth');
        const url = new URL(window.location);
        url.searchParams.delete('admin');
        window.history.pushState({}, '', url);
        break;
      case 'GO_HOME':
        const u2 = new URL(window.location);
        u2.searchParams.delete('admin');
        window.history.pushState({}, '', u2);
        break;
    }
    render();
  };

  // ─── EVENT HANDLERS ────────────────────────────────────────────────────────
  window.handleLogin = async (e) => {
    e.preventDefault();
    const user = document.getElementById('f-user')?.value?.trim();
    const pass = document.getElementById('f-pass')?.value;
    state.loginError = '';
    state.loginLoading = true;
    render();

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();

      if (res.ok && data.success) {
        state.isLoggedIn = true;
        sessionStorage.setItem('smc_admin_auth', 'true');
      } else {
        state.loginError = data.error || 'Incorrect username or password. Please try again.';
      }
    } catch (err) {
      state.loginError = 'Network error. Please try again.';
    }

    state.loginLoading = false;
    render();
  };

  window.handleStartEdit = (id) => {
    const pkg = state.packages.find(p => p.id === id);
    if (!pkg) return;
    state.editingId = id;
    state.draft = { title: pkg.title, duration: pkg.duration, highlight: pkg.highlight, image: pkg.image || '', pdfUrl: pkg.pdfUrl };
    state.formError = '';
    state.formSuccess = '';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.handleCancelEdit = () => {
    state.editingId = null;
    state.draft = { title: '', duration: '', highlight: '', image: '', pdfUrl: '' };
    state.formError = '';
    state.formSuccess = '';
    render();
  };

  window.handlePackageSubmit = async (e) => {
    e.preventDefault();
    state.formError = '';
    state.formSuccess = '';

    const title     = document.getElementById('f-title')?.value?.trim();
    const duration  = document.getElementById('f-duration')?.value?.trim();
    const highlight = document.getElementById('f-highlight')?.value?.trim();
    const image     = document.getElementById('f-image')?.value?.trim();
    const pdfUrl    = document.getElementById('f-pdf')?.value?.trim();

    if (!title || !duration || !pdfUrl) {
      state.formError = 'Country title, duration, and PDF link are required.';
      render(); return;
    }

    try { new URL(pdfUrl); } catch(_) {
      state.formError = 'Please enter a valid PDF URL (must start with https://).';
      render(); return;
    }

    const payload = {
      title: title.trim(),
      duration: duration.trim(),
      highlight: highlight || '',
      image: image || 'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=800&q=80',
      pdfUrl,
      createdAt: new Date().toISOString()
    };

    if (!isFirebaseReady || !db) {
      if (state.editingId) {
        state.packages = state.packages.map(p => p.id === state.editingId ? { ...p, ...payload } : p);
      } else {
        state.packages = [{ id: 'pkg-' + Date.now(), ...payload }, ...state.packages];
      }
      saveLocal('smc_pkgs_v4', state.packages);
      state.editingId = null;
      state.draft = { title: '', duration: '', highlight: '', image: '', pdfUrl: '' };
      state.formSuccess = state.editingId ? 'Package updated.' : 'Package published successfully.';
      render(); return;
    }

    try {
      if (state.editingId) {
        const ref = doc(db, 'artifacts', APP_ID, 'public', 'data', 'packages', state.editingId);
        await updateDoc(ref, payload);
        state.formSuccess = 'Package updated successfully.';
      } else {
        const col = collection(db, 'artifacts', APP_ID, 'public', 'data', 'packages');
        await addDoc(col, payload);
        state.formSuccess = 'Package published successfully.';
      }
      state.editingId = null;
      state.draft = { title: '', duration: '', highlight: '', image: '', pdfUrl: '' };
    } catch (err) {
      state.formError = 'Database error: ' + err.message;
    }
    render();
  };

  window.triggerDeleteConfirmation = (id) => {
    state.deleteTargetId = id;
    render();
  };

  window.cancelDelete = () => {
    state.deleteTargetId = null;
    render();
  };

  window.confirmDelete = async () => {
    const id = state.deleteTargetId;
    if (!id) return;

    if (!isFirebaseReady || !db) {
      state.packages = state.packages.filter(p => p.id !== id);
      saveLocal('smc_pkgs_v4', state.packages);
      if (state.editingId === id) { state.editingId = null; state.draft = { title: '', duration: '', highlight: '', image: '', pdfUrl: '' }; }
      state.deleteTargetId = null;
      render(); return;
    }
    try {
      await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'packages', id));
      if (state.editingId === id) { state.editingId = null; state.draft = { title: '', duration: '', highlight: '', image: '', pdfUrl: '' }; }
    } catch (err) { console.error('Delete error:', err); }
    
    state.deleteTargetId = null;
    render();
  };

  // ─── RENDER ────────────────────────────────────────────────────────────────
  function render() {
    // Preserve typing focus and cursor position dynamically on key presses
    const activeId = document.activeElement ? document.activeElement.id : null;
    let selectionStart = null;
    let selectionEnd = null;
    if (activeId) {
      const activeEl = document.getElementById(activeId);
      if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
        selectionStart = activeEl.selectionStart;
        selectionEnd = activeEl.selectionEnd;
      }
    }

    state.view = getView();
    const container = document.getElementById('app');
    if (!container) return;

    // Advanced search + category filter logic
    const filtered = state.packages.filter(p => {
      const q = state.searchQuery.toLowerCase();
      const matchesSearch = !q || esc(p.title).toLowerCase().includes(q) || esc(p.highlight).toLowerCase().includes(q);
      const matchesCountry = state.selectedCountryFilter === 'All' || p.title === state.selectedCountryFilter;
      return matchesSearch && matchesCountry;
    });

    let html = '';

    // ── NAV ──
    // Redesigned to crisp white (#ffffff) to ensure Rayna Tours' dark logo design stands out perfectly
    html += `
    <header style="position:sticky;top:0;z-index:40;background:#ffffff;box-shadow:0 2px 12px rgba(10,22,40,0.06);border-bottom:1px solid #ede9e1;">
      <div style="max-width:1200px;margin:0 auto;padding:0 20px;height:58px;display:flex;justify-content:space-between;align-items:center;">
        
        <div style="display:flex;align-items:center;gap:12px;cursor:pointer;" onclick="dispatch('GO_HOME')">
          <img src="https://d2cazmkfw8kdtj.cloudfront.net/assets/Images/AGT-31082/logo.png" alt="Rayna Tours" style="height:38px; width:auto; max-width:180px; object-fit:contain;" onerror="this.src='https://placehold.co/150x40/faf8f4/0a1628?text=Rayna+Tours'" />
          <div>
            <div style="font-size:8px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(10,22,40,0.5);display:flex;align-items:center;gap:4px;margin-top:1px;">

          ` : ''}
          ${state.view === 'customer' && !state.isLoggedIn ? `

          ` : ''}
        </div>
      </div>
    </header>`;

    if (state.view === 'customer') {
      html += renderCustomer(filtered);
    } else if (state.view === 'admin-login') {
      html += renderLogin();
    } else if (state.view === 'admin') {
      html += renderAdmin();
    }

    // ── FOOTER ──
    html += `
    <footer style="padding:24px 20px;border-top:1px solid #ede9e1;background:#fff;">
      <div style="max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:var(--navy);">Rayna Tours</div>
          <div style="font-size:10px;color:rgba(10,22,40,0.45);margin-top:2px;">© 2026 SMC Tours Ltd. All rights reserved.</div>
        </div>
        <div style="font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(10,22,40,0.35);">
          Premium Departures Hub
        </div>
      </div>
    </footer>`;

    if (state.deleteTargetId) {
      html += renderDeleteConfirmationModal();
    }

    container.innerHTML = html;

    // Restore focus and precise character selection ranges immediately
    if (activeId) {
      const restoreEl = document.getElementById(activeId);
      if (restoreEl) {
        restoreEl.focus();
        if (selectionStart !== null && selectionEnd !== null && typeof restoreEl.setSelectionRange === 'function') {
          restoreEl.setSelectionRange(selectionStart, selectionEnd);
        }
      }
    }
  }

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2">
              <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <p style="font-size:13px;color:#0a1628;margin:0 0 6px;font-weight:600;">
            Confirm removal of <span style="color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:16px;">${esc(pkgTitle)}</span>?
          </p>
          <p style="font-size:11px;color:#666;line-height:1.5;margin:0 0 18px;">
            This action instantly removes the package from customer schedules.
          </p>
          <div style="display:flex;gap:8px;">
            <button class="btn-outline" onclick="window.cancelDelete()" style="flex:1;padding:8px;">Cancel</button>
            <button class="btn-gold" onclick="window.confirmDelete()" style="flex:1;background:#dc2626;color:#fff;border:none;justify-content:center;padding:8px;">Confirm</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  // ─── BOOT ──────────────────────────────────────────────────────────────────
  window.addEventListener('popstate', render);

  setTimeout(() => {
    if (state.isDbLoading) {
      console.warn("Database connection timed out. Booting local offline sandbox.");
      loadLocalFallback();
    }
  }, 3000);

  window.onload = async () => {
    await initAuth();
    setupListeners();
    render();
  };
</script>
</body>
</html>
